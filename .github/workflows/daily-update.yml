name: 1 — Günlük Fiyat Çek (PR Aç)

on:
  schedule:
    # Her gün Türkiye 18:00 (UTC 15:00), Pazartesi–Cuma
    - cron: "0 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: API key kontrolü
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ANTHROPIC_API_KEY secret tanımlı değil!"
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY mevcut."

      - name: Fiyatları çek
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Değişiklik var mı?
        id: check
        run: |
          git diff --quiet data/gold.json data/gbp.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Güncelleme branch'i oluştur ve push et
        if: steps.check.outputs.changed == 'true'
        run: |
          DATE=$(date +'%Y-%m-%d')
          BRANCH="price-update/$DATE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Uzakta aynı isimde branch varsa sil (önceki yarım çalışma kalıntısı)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add data/gold.json data/gbp.json
          git commit -m "chore: $DATE fiyat güncellemesi (revizyon için)"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "DATE=$DATE"     >> $GITHUB_ENV

      - name: Fiyat özetini hazırla
        if: steps.check.outputs.changed == 'true'
        id: summary
        run: |
          python3 << 'PYEOF'
          import json, os

          with open("data/gold.json") as f:
              gold = json.load(f)
          with open("data/gbp.json") as f:
              gbp = json.load(f)

          gl = gold[-1]
          bl = gbp[-1]

          def fmt(val, fallback=None):
              v = val if val is not None else fallback
              if v is None:
                  return "—"
              try:
                  return f"{float(v):,.2f}"
              except (TypeError, ValueError):
                  return str(v)

          def fmts(val):
              return str(val) if val is not None else "—"

          branch = os.environ.get("BRANCH", "")
          repo   = os.environ.get("GITHUB_REPOSITORY", "")

          # revizyon.html linki — branch URL parametresiyle
          revizyon_url = (
              f"https://{repo.split('/')[0]}.github.io/{repo.split('/')[1]}/revizyon.html"
              f"?branch={branch}&repo={repo}"
          )

          body = f"""## 📊 Günlük Fiyat Güncellemesi — {gl['date']}

          ### 🥇 İş Bankası Gram Altın
          | | Değer |
          |---|---|
          | Alış | **{fmt(gl.get('alis'))} TL** |
          | Satış | **{fmt(gl.get('satis'))} TL** |
          | Kaynak | {fmts(gl.get('kaynak'))} |

          ### 💷 GBP/TRY
          | | İşBankası | TCMB |
          |---|---|---|
          | Alış | **{fmt(bl.get('isbank_alis'), bl.get('alis'))} TL** | {fmt(bl.get('tcmb_alis'))} TL |
          | Satış | **{fmt(bl.get('isbank_satis'), bl.get('satis'))} TL** | {fmt(bl.get('tcmb_satis'))} TL |
          | Fark (satış) | **+{fmt(bl.get('fark_satis'), 0)} TL** | — |

          ---
          ✅ Fiyatlar doğruysa **Merge** et.
          ✏️ Fiyatları düzeltmek için → **[Revizyon Sayfasını Aç]({revizyon_url})**
          &nbsp;&nbsp;&nbsp;_(GitHub token ile düzeltip kaydedebilirsin, sonra bu PR'ı merge et)_
          """

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write("PR_BODY<<DELIM\n")
              f.write(body + "\n")
              f.write("DELIM\n")
          PYEOF

      - name: PR aç
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "💰 $(date +'%Y-%m-%d') Fiyat Güncellemesi — Revizyon Gerekebilir" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" \
            --label "price-update" || true
