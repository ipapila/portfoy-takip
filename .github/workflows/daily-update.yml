name: Günlük Fiyat Güncelleme

on:
  schedule:
    # Her gün Türkiye saatiyle 18:00 civarı (UTC 15:00) — borsa kapanışı sonrası
    - cron: "0 15 * * 1-5"
  workflow_dispatch:   # Elle de tetiklenebilir

permissions:
  contents: write      # data/ JSON dosyalarını commit edebilmek için

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fiyatları güncelle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Değişiklikleri commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold.json data/gbp.json
          git diff --cached --quiet || git commit -m "chore: $(date +'%Y-%m-%d') fiyat güncellemesi [skip ci]"
          git push
